<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Global Error Catcher
      window.onerror = function(msg, url, line, col, error) {
        var errDiv = document.getElementById('debug-info');
        if (errDiv) {
          errDiv.innerHTML = '<div style="color:#ff4d4d;margin-top:20px;font-weight:bold;">CRASH DETECTED:</div>' + 
                             '<div style="font-size:10px;margin-top:5px;word-break:break-all;">' + msg + '</div>' +
                             '<div style="font-size:10px;">Line: ' + line + ' Col: ' + col + '</div>';
        }
        return false;
      };
    </script>
    <script src="https://unpkg.com/resize-observer-polyfill@1.5.1/dist/ResizeObserver.global.js"></script>
    <script>
      if (!window.ResizeObserver) window.ResizeObserver = ResizeObserver;
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>THE SEOUL PRIVATE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Serif+Khmer:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="boot-loader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e1a;color:#D4AF37;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:serif;z-index:99999;text-align:center;padding:20px;">
      <div style="font-size:24px;letter-spacing:0.3em;margin-bottom:10px;">THE SEOUL PRIVATE</div>
      <div id="status-msg" style="font-size:12px;opacity:0.8;font-family:sans-serif;">SYSTEM STARTING...</div>
      <div id="debug-info" style="margin-top:30px;font-family:monospace;font-size:10px;opacity:0.6;color:#888;"></div>
      <div style="margin-top:50px;font-size:9px;opacity:0.4;">VERSION: 1.2.5 (STABLE BASE)</div>
      <script>
        try {
          document.getElementById('debug-info').innerHTML = 'CHECKING ENGINE: OK<br>BROWSER: ' + navigator.userAgent.substring(0, 50) + '...';
        } catch(e) {}
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
